<!doctype html>
<meta charset="utf-8">
<div class="toolbar">
  <button type="button" class="toolbar-button" data-direction="-1">-</button>
  <button type="button" id="print-button" class="toolbar-button">Print</button>
  <button type="button" class="toolbar-button" data-direction="1">+</button>
</div>
<main>
  <div id="tracking-display">
    <span class="tracking-prefix">0-000-</span><b id="counter-value">01</b>
  </div>
  <canvas id="dm" aria-label="DataMatrix code"></canvas>
</main>
<style>
* {
  padding: 0;
  margin: 0;
  border: 0;
  box-sizing: border-box;
}
body {
  height: 100vw; // force square
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
  background-color: white;
  color: black;
}
main {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  background-color: #fff;
}
#tracking-display {
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.1rem;
  display: flex;
  align-items: baseline;
  gap: 0rem;
}
.tracking-prefix {
  font-weight: 400;
}
#dm {
  transform: rotate(90deg);
}
.toolbar {
  position: fixed;
  top: 1.25rem;
  right: 1.25rem;
  display: flex;
  gap: 0.75rem;
  align-items: center;
  padding: 0.75rem 1rem;
  background-color: #fff;
  border: 1px solid #d8dde7;
  border-radius: 999px;
  box-shadow: 0 10px 35px rgba(15, 23, 42, 0.12);
}
.toolbar-button {
  padding: 0.4rem 1.1rem;
  border-radius: 999px;
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  background-color: #0f172a;
  color: #fff;
  border: none;
}
.toolbar-button[data-direction] {
  background-color: #2563eb;
}
.toolbar-button:focus-visible {
  outline: 2px solid #f97316;
  outline-offset: 2px;
}
@media print {
  .toolbar {
    display: none !important;
  }
  body {
    background-color: #fff;
  }
  main {
    box-shadow: none;
    border: none;
    padding: 0;
  }
}
</style>
<script src="https://unpkg.com/bwip-js/dist/bwip-js-min.js"></script>
<script>
const dmCanvas = document.getElementById("dm");
const counterElement = document.getElementById("counter-value");
const baseMatrixPrefix = "00.000.";
let counterValue = counterElement.textContent.trim().toUpperCase() || "01";

const printButton = document.getElementById("print-button");
printButton.addEventListener("click", () => window.print());

document.querySelectorAll('[data-direction]').forEach(button => {
  button.addEventListener("click", () => handleAdjust(Number(button.dataset.direction)));
});

function handleAdjust(step) {
  let numeric = parseInt(counterValue, 36) + step;
  if (numeric < 0) {
    numeric = 0;
  }
  const next = numeric.toString(36).toUpperCase();
  counterValue = next.padStart(2, "0");
  updateDisplay();
}

function updateDisplay() {
  counterElement.textContent = counterValue;
  const matrixValue = `${baseMatrixPrefix}${counterValue}`;
  bwipjs.toCanvas(dmCanvas, {
    bcid: "datamatrix",
    text: matrixValue,
    scale: 2,
    padding: 0
  });
}

updateDisplay();
</script>
